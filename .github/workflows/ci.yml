name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-unit-tests:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Asisya.slnx

      - name: Build
        run: dotnet build Asisya.slnx --no-restore -c Release

      - name: Unit Tests
        run: >
          dotnet test Asisya.Tests/Asisya.Tests.csproj
          --no-build -c Release
          --filter "FullyQualifiedName~Unit"
          --logger "trx;LogFileName=unit-tests.trx"

      - name: Upload unit test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: "**/*.trx"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: asisya_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Asisya.slnx

      - name: Build
        run: dotnet build Asisya.slnx --no-restore -c Release

      - name: Integration Tests
        run: >
          dotnet test Asisya.Tests/Asisya.Tests.csproj
          --no-build -c Release
          --filter "FullyQualifiedName~Integration"
          --logger "trx;LogFileName=integration-tests.trx"
        env:
          ConnectionStrings__DefaultConnection: "Host=127.0.0.1;Port=5432;Database=asisya_ci;Username=postgres;Password=postgres"
          JwtSettings__SecretKey: "asisya-super-secret-key-2026-must-be-at-least-32-chars!"
          JwtSettings__Issuer: "asisya-api"
          JwtSettings__Audience: "asisya-clients"
          JwtSettings__ExpirationMinutes: "60"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: "**/*.trx"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-and-unit-tests, integration-tests]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t asisya-api:latest .

      - name: Build Frontend image
        run: docker build -t asisya-frontend:latest ./asisya-frontend
